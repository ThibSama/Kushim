services:
  kushim-website:
    build:
      context: ./kushim-website
    env_file:
      - ./kushim-website/.env.local.example
    expose:
      - "3000"
    networks:
      - kushim_network

  kushim-auth-front:
    build:
      context: ./kushim-auth/front
    env_file:
      - ./kushim-auth/front/.env.local.example
    expose:
      - "3001"
    networks:
      - kushim_network

  kushim-auth-api:
    build:
      context: ./kushim-auth/api
    env_file:
      - ./kushim-auth/api/.env.example
    expose:
      - "3002"
    networks:
      - kushim_network

  kushim-app:
    build:
      context: ./kushim-app
    env_file:
      - ./kushim-app/.env.example
    expose:
      - "5173"
    networks:
      - kushim_network

  kushim-api:
    build:
      context: ./kushim-api
    env_file:
      - ./.env.example
      - ./kushim-api/.env.example
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - kushim_network

  kushim-market-data:
    build:
      context: ./kushim-market-data
    env_file:
      - ./kushim-market-data/.env.example
    networks:
      - kushim_network

  kushim-worker:
    build:
      context: ./kushim-worker
    env_file:
      - ./kushim-worker/.env.example
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kushim_network

  database:
    image: postgres:16
    container_name: kushim_database
    env_file:
      - ./.env.docker.example
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kushim_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      kushim_network:
        aliases:
          - postgres
          - database

  redis:
    image: redis:8-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kushim_network

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - kushim-website
      - kushim-auth-front
      - kushim-app
      - kushim-api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kushim_network

networks:
  kushim_network:
    driver: bridge

volumes:
  kushim_postgres_data:
  redis-data:
