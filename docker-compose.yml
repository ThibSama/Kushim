services:
  kushim-website:
    build:
      context: ./kushim-website
    # Force Webpack dev mode inside Docker. Turbopack 16.2.6 panics intermittently
    # on HMR chunk loads ("Failed to load chunk [turbopack]/browser/dev/hmr-client"),
    # making the dev runtime hard-reload the document in a loop. Webpack dev is
    # officially supported by Next 16 (`--webpack`) and stable in this container.
    command: ["npm", "run", "dev:docker"]
    env_file:
      - ./kushim-website/.env.local.example
    # Explicit Docker overrides: the dev server reads NEXT_PUBLIC_* at runtime,
    # so these canonical nginx URLs reach the browser bundle reliably (the
    # example env_file documents direct-dev defaults only).
    environment:
      NEXT_PUBLIC_AUTH_URL: http://auth.kushim.localhost
    expose:
      - "3000"
    networks:
      - kushim_network

  kushim-auth-front:
    build:
      context: ./kushim-auth/front
    # Force Webpack dev mode inside Docker. Turbopack 16.2.6 panics intermittently
    # ("Next.js package not found" during HMR of /connexion/page), which makes the
    # HMR client hard-reload the document in a loop. Webpack dev is officially
    # supported by Next 16 (`--webpack`) and stable in this container.
    command: ["npm", "run", "dev:docker"]
    env_file:
      - ./kushim-auth/front/.env.local.example
    environment:
      NEXT_PUBLIC_APP_URL: http://app.kushim.localhost
      NEXT_PUBLIC_WEBSITE_URL: http://kushim.localhost
      NEXT_PUBLIC_AUTH_API_URL: http://auth-api.kushim.localhost
    expose:
      - "3001"
    networks:
      - kushim_network

  kushim-auth-api:
    build:
      context: .
      dockerfile: ./kushim-auth/api/Dockerfile
    env_file:
      - ./kushim-auth/api/.env.example
    environment:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@database:5432/kushim
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_ENABLED: "true"
      APP_ENV: docker
      # Browser origins that legitimately call the auth API: the auth frontend
      # (login/signup/handoff create) and the app (handoff exchange). Direct-dev
      # origins retained. Explicit allowlist, no wildcard.
      CORS_ALLOWED_ORIGINS: "http://auth.kushim.localhost,http://app.kushim.localhost,http://localhost:3001,http://localhost:5173"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3002"
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kushim_network

  kushim-app:
    build:
      context: ./kushim-app
    env_file:
      - ./kushim-app/.env.example
    # Explicit Docker overrides: Vite exposes VITE_*-prefixed process env to
    # import.meta.env at dev-server start, so these canonical nginx URLs reach
    # the browser bundle reliably.
    environment:
      VITE_AUTH_URL: http://auth.kushim.localhost
      VITE_AUTH_API_URL: http://auth-api.kushim.localhost
      VITE_API_URL: http://api.kushim.localhost
    expose:
      - "5173"
    networks:
      - kushim_network

  kushim-api:
    build:
      context: ./kushim-api
    env_file:
      - ./.env.example
      - ./kushim-api/.env.example
    environment:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@database:5432/kushim
      APP_ENV: docker
      KUSHIM_API_HOST: 0.0.0.0
      KUSHIM_API_PORT: 8080
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev_only_change_me_minimum_32_chars}
      JWT_ISSUER: ${JWT_ISSUER:-kushim-auth}
      # Browser origin that calls the business API: the app. Direct-dev origin
      # retained. Explicit allowlist, no wildcard.
      CORS_ALLOWED_ORIGINS: "http://app.kushim.localhost,http://localhost:5173"
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kushim_network

  kushim-market-data:
    build:
      context: ./kushim-market-data
    env_file:
      - ./kushim-market-data/.env.example
      - path: ./kushim-market-data/.env
        required: false
    environment:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@database:5432/kushim
      APP_ENV: docker
      MARKET_DATA_HOST: 0.0.0.0
      MARKET_DATA_PORT: 8082
      MARKET_DATA_MODE: idle
      MARKET_DATA_JOB: noop
      MARKET_DATA_PROVIDER: mock
      MARKET_DATA_RUN_INTERVAL_SECONDS: 300
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "8082"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kushim_network

  kushim-worker:
    build:
      context: ./kushim-worker
    env_file:
      - ./kushim-worker/.env.example
    environment:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@database:5432/kushim
      APP_ENV: docker
      WORKER_NAME: kushim-worker
      WORKER_MODE: idle
      WORKER_JOB: noop
      WORKER_POLL_INTERVAL_SECONDS: 30
      WORKER_TARGET_PORTFOLIO_ID: ""
      WORKER_SNAPSHOT_DATE: ""
      WORKER_BACKFILL_DATE_FROM: ""
      WORKER_BACKFILL_DATE_TO: ""
      REDIS_URL: redis://redis:6379/0
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 8081
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kushim_network

  database:
    image: postgres:16
    container_name: kushim_database
    env_file:
      - ./.env.docker.example
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kushim_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./infra/postgres/init/002_seed_canonical_assets.sql:/docker-entrypoint-initdb.d/002_seed_canonical_assets.sql:ro
      - ./infra/postgres/init/003_seed_auth_roles.sql:/docker-entrypoint-initdb.d/003_seed_auth_roles.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      kushim_network:
        aliases:
          - postgres
          - database

  redis:
    image: redis:8-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis-data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kushim_network

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      - kushim-website
      - kushim-auth-front
      - kushim-app
      - kushim-api
      - kushim-auth-api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kushim_network

networks:
  kushim_network:
    driver: bridge

volumes:
  kushim_postgres_data:
  redis-data:
