name: MVP Smoke Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Frontend ──────────────────────────────────────────────────────
  kushim-app:
    name: "kushim-app (lint + build)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kushim-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: kushim-app/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  kushim-auth-front:
    name: "kushim-auth/front (lint + build)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kushim-auth/front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: kushim-auth/front/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  kushim-website:
    name: "kushim-website (lint + build)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kushim-website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: kushim-website/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─── Rust services ─────────────────────────────────────────────────
  # Each Rust service is an independent Cargo project (no root workspace).
  # Integration tests in job modules require PostgreSQL with the full DDL.

  kushim-market-data:
    name: "kushim-market-data (fmt + clippy + test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kushim-market-data
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kushim
          POSTGRES_PASSWORD: kushim_secret_dev
          POSTGRES_DB: kushim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kushim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@localhost:5432/kushim
    steps:
      - uses: actions/checkout@v4

      - name: Init database schema
        run: psql "$DATABASE_URL" -f ../infra/postgres/init/001_init.sql

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kushim-market-data

      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  kushim-api:
    name: "kushim-api (fmt + clippy + test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kushim-api
    services:
      # Per-job ephemeral PostgreSQL container. The database is named
      # `kushim_test_ci` so the `require_disposable_test_database_url` guard
      # in test_support.rs accepts it (the guard refuses anything not
      # prefixed with `kushim_test_`). The container is destroyed when the
      # job ends, so no cross-run state can leak.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kushim
          POSTGRES_PASSWORD: kushim_secret_dev
          POSTGRES_DB: kushim_test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kushim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@localhost:5432/kushim_test_ci
    steps:
      - uses: actions/checkout@v4

      - name: Init database schema
        run: psql "$DATABASE_URL" -f ../infra/postgres/init/001_init.sql

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kushim-api

      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  kushim-worker:
    name: "kushim-worker (fmt + clippy + test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kushim-worker
    services:
      # Per-job ephemeral PostgreSQL container — same rationale as
      # kushim-api above. `kushim_test_ci` satisfies the worker's
      # `require_disposable_test_database_url` guard in test_utils.rs.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kushim
          POSTGRES_PASSWORD: kushim_secret_dev
          POSTGRES_DB: kushim_test_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kushim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@localhost:5432/kushim_test_ci
    steps:
      - uses: actions/checkout@v4

      - name: Init database schema
        run: psql "$DATABASE_URL" -f ../infra/postgres/init/001_init.sql

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kushim-worker

      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  kushim-auth-api:
    name: "kushim-auth-api (fmt + clippy + test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kushim-auth/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kushim
          POSTGRES_PASSWORD: kushim_secret_dev
          POSTGRES_DB: kushim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kushim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@localhost:5432/kushim
    steps:
      - uses: actions/checkout@v4

      - name: Init database schema
        run: psql "$DATABASE_URL" -f ../../infra/postgres/init/001_init.sql

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kushim-auth/api

      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test

  fresh-db-bootstrap:
    name: "Fresh-database bootstrap (schema + seeds, idempotency + identity)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kushim
          POSTGRES_PASSWORD: kushim_secret_dev
          POSTGRES_DB: kushim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kushim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://kushim:kushim_secret_dev@localhost:5432/kushim
    steps:
      - uses: actions/checkout@v4

      - name: Load schema (001_init.sql)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/001_init.sql

      - name: Apply canonical asset seed (first run)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/002_seed_canonical_assets.sql

      - name: Apply auth role seed (first run)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/003_seed_auth_roles.sql

      - name: Apply canonical asset seed (second run — must be idempotent)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/002_seed_canonical_assets.sql

      - name: Apply auth role seed (second run — must be idempotent)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/003_seed_auth_roles.sql

      - name: Assert exactly one 'user' role with deterministic id_role = 1
        run: |
          set -euo pipefail
          total=$(psql "$DATABASE_URL" -t -A -c "SELECT COUNT(*) FROM roles WHERE label = 'user';")
          if [ "$total" != "1" ]; then
            echo "Expected exactly one 'user' role, found $total" >&2
            exit 1
          fi
          id_one=$(psql "$DATABASE_URL" -t -A -c "SELECT COUNT(*) FROM roles WHERE label = 'user' AND id_role = 1;")
          if [ "$id_one" != "1" ]; then
            echo "'user' role does not have deterministic id_role = 1" >&2
            exit 1
          fi

      - name: Assert exactly three seeded canonical rows (no extras)
        run: |
          set -euo pipefail
          count=$(psql "$DATABASE_URL" -t -A -c "SELECT COUNT(*) FROM assets WHERE (ticker, exchange) IN (('AAPL','NASDAQ'),('MSFT','NASDAQ'),('NVDA','NASDAQ'));")
          if [ "$count" != "3" ]; then
            echo "Expected 3 canonical rows, found $count" >&2
            exit 1
          fi
          # The seed must not introduce unexpected extra asset rows on a fresh DB.
          total_assets=$(psql "$DATABASE_URL" -t -A -c "SELECT COUNT(*) FROM assets;")
          if [ "$total_assets" != "3" ]; then
            echo "Fresh database has $total_assets asset rows, expected exactly 3 from the canonical seed" >&2
            exit 1
          fi

      - name: Assert exactly one row per canonical (ticker, exchange)
        run: |
          set -euo pipefail
          dup=$(psql "$DATABASE_URL" -t -A -c "SELECT COALESCE(SUM(c-1),0) FROM (SELECT COUNT(*) c FROM assets WHERE (ticker, exchange) IN (('AAPL','NASDAQ'),('MSFT','NASDAQ'),('NVDA','NASDAQ')) GROUP BY ticker, exchange) s;")
          if [ "$dup" != "0" ]; then
            echo "Duplicate canonical rows detected: $dup extra" >&2
            exit 1
          fi

      - name: Assert canonical rows are active USD equities
        run: |
          set -euo pipefail
          bad=$(psql "$DATABASE_URL" -t -A -c "SELECT COUNT(*) FROM assets WHERE (ticker, exchange) IN (('AAPL','NASDAQ'),('MSFT','NASDAQ'),('NVDA','NASDAQ')) AND NOT (status = 'active' AND native_currency = 'USD' AND asset_class = 'equity');")
          if [ "$bad" != "0" ]; then
            echo "Canonical rows do not all satisfy active/USD/equity: $bad row(s) fail" >&2
            exit 1
          fi

      - name: Assert seeded UUIDs match the documented canonical UUIDs
        run: |
          set -euo pipefail
          ok=$(psql "$DATABASE_URL" -t -A -c "SELECT COUNT(*) FROM assets WHERE id_asset IN ('01993b00-0001-7000-8001-aaaaaaaaaaaa','01993b00-0002-7000-8001-bbbbbbbbbbbb','01993b00-0003-7000-8001-cccccccccccc') AND (ticker, exchange) IN (('AAPL','NASDAQ'),('MSFT','NASDAQ'),('NVDA','NASDAQ'));")
          if [ "$ok" != "3" ]; then
            echo "Documented canonical UUIDs are not all present: $ok / 3" >&2
            exit 1
          fi

      # P3 schema assertions: a fresh database must already carry the durable
      # idempotency table with its unique key, all five FKs (each with the
      # documented ON DELETE action) and the two CHECKs that enforce the
      # request_kind / corrected-operation coherence.
      - name: Assert portfolio_operation_idempotency table exists
        run: |
          set -euo pipefail
          present=$(psql "$DATABASE_URL" -t -A -c "SELECT to_regclass('public.portfolio_operation_idempotency') IS NOT NULL;")
          if [ "$present" != "t" ]; then
            echo "portfolio_operation_idempotency table missing from fresh schema" >&2
            exit 1
          fi

      - name: Assert P3 unique (id_user, idempotency_key) index exists
        run: |
          set -euo pipefail
          present=$(psql "$DATABASE_URL" -t -A -c "SELECT EXISTS(SELECT 1 FROM pg_indexes WHERE indexname = 'uq_portfolio_operation_idempotency_user_key');")
          if [ "$present" != "t" ]; then
            echo "uq_portfolio_operation_idempotency_user_key missing — P3 contract cannot be enforced" >&2
            exit 1
          fi

      - name: Assert P3 foreign keys with documented ON DELETE actions
        run: |
          set -euo pipefail
          # confdeltype: 'r' RESTRICT, 'n' SET NULL.
          declare -A expected=(
            [fk_portfolio_operation_idempotency_user]=r
            [fk_portfolio_operation_idempotency_portfolio]=r
            [fk_portfolio_operation_idempotency_operation]=r
            [fk_portfolio_operation_idempotency_corrected_operation]=n
            [fk_portfolio_operation_idempotency_refresh_request]=n
          )
          for name in "${!expected[@]}"; do
            want=${expected[$name]}
            got=$(psql "$DATABASE_URL" -t -A -c "SELECT confdeltype FROM pg_constraint WHERE conname = '$name' AND contype = 'f';")
            if [ -z "$got" ]; then
              echo "FK $name missing" >&2
              exit 1
            fi
            if [ "$got" != "$want" ]; then
              echo "FK $name has wrong ON DELETE: got=$got want=$want" >&2
              exit 1
            fi
          done

      - name: Assert P3 request_kind and correction-link CHECKs
        run: |
          set -euo pipefail
          for name in chk_portfolio_operation_idempotency_request_kind chk_portfolio_operation_idempotency_correction_link; do
            present=$(psql "$DATABASE_URL" -t -A -c "SELECT EXISTS(SELECT 1 FROM pg_constraint WHERE conname = '$name' AND contype = 'c');")
            if [ "$present" != "t" ]; then
              echo "CHECK constraint $name missing" >&2
              exit 1
            fi
          done

      - name: Apply forward upgrade 002 (first run — idempotent on fresh DB)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/upgrades/002_portfolio_operation_idempotency.sql

      - name: Apply forward upgrade 002 (second run — must remain a no-op)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/upgrades/002_portfolio_operation_idempotency.sql

      - name: Assert P3 schema still consistent after running upgrade 002 twice
        run: |
          set -euo pipefail
          present=$(psql "$DATABASE_URL" -t -A -c "SELECT to_regclass('public.portfolio_operation_idempotency') IS NOT NULL;")
          if [ "$present" != "t" ]; then
            echo "Upgrade 002 dropped portfolio_operation_idempotency" >&2
            exit 1
          fi
          # FK delete actions must still be the documented ones after the
          # idempotent upgrade pass — guards against a future regression in
          # the ALTER block.
          for pair in fk_portfolio_operation_idempotency_user:r fk_portfolio_operation_idempotency_portfolio:r fk_portfolio_operation_idempotency_operation:r fk_portfolio_operation_idempotency_corrected_operation:n fk_portfolio_operation_idempotency_refresh_request:n; do
            name=${pair%%:*}
            want=${pair##*:}
            got=$(psql "$DATABASE_URL" -t -A -c "SELECT confdeltype FROM pg_constraint WHERE conname = '$name' AND contype = 'f';")
            if [ "$got" != "$want" ]; then
              echo "After upgrade 002 twice: FK $name has wrong ON DELETE: got=$got want=$want" >&2
              exit 1
            fi
          done

  rust-audit:
    name: "Rust advisory audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust services
        run: |
          set -euo pipefail
          for service in kushim-auth/api kushim-api kushim-worker kushim-market-data; do
            echo "::group::cargo audit --ignore RUSTSEC-2023-0071 ($service)"
            (cd "$service" && cargo audit --ignore RUSTSEC-2023-0071)
            echo "::endgroup::"
          done
