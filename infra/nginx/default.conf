# Websocket upgrade mapping for the dev servers (Next.js Turbopack HMR, Vite HMR).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Docker's embedded DNS. Used by every variable-based upstream below — the
# `/_health/*` routes AND the `api.kushim.localhost` / `auth-api.kushim.localhost`
# direct-host proxies — so those names resolve at request time, not at config
# load. This is what lets nginx load, start and reload (and keep serving the
# website / app / auth) even when a backend service is absent from Docker DNS —
# precisely the outage scenario this stack must survive. A down upstream then
# yields a fast non-2xx (502/504) instead of an nginx boot failure. One shared
# resolver in the http context covers all server blocks.
resolver 127.0.0.11 ipv6=off valid=10s;

# Same-origin service-health endpoints.
#
# Each `/_health/<service>` is an EXACT location (`=`) so it always wins over the
# catch-all `location /` and can never be shadowed by, or fall back to, the SPA /
# Next.js dev server. Each route proxies to exactly one upstream `/ready` path:
# the URI after the variable (`/ready`) is sent literally, so no client path is
# forwarded and no arbitrary service path can be reached.
#
# Timeouts are deliberately short: an unreachable upstream must surface as a fast
# non-2xx (nginx 502/504) instead of hanging the browser probe. The Rust `/ready`
# handlers already return normalized errors (no SQL/internal detail), and these
# routes add no CORS headers — they are consumed same-origin only.
#
# This snippet is duplicated verbatim in the `kushim.localhost` and
# `app.kushim.localhost` servers; nginx has no macro mechanism. Keep them in sync.

server {
    listen 80;
    server_name kushim.localhost;

    location = /_health/api {
        set $health_upstream kushim-api:8080;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location = /_health/auth {
        set $health_upstream kushim-auth-api:3002;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location = /_health/worker {
        set $health_upstream kushim-worker:8081;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location = /_health/market-data {
        set $health_upstream kushim-market-data:8082;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location / {
        proxy_pass http://kushim-website:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js 16 + Turbopack uses a websocket for the dev runtime/HMR.
        # Without the upgrade, the client runtime stays disconnected and React
        # never hydrates (submit forms fall through to a native GET → trailing
        # `?` on the URL).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name app.kushim.localhost;

    location = /_health/api {
        set $health_upstream kushim-api:8080;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location = /_health/auth {
        set $health_upstream kushim-auth-api:3002;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location = /_health/worker {
        set $health_upstream kushim-worker:8081;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location = /_health/market-data {
        set $health_upstream kushim-market-data:8082;
        proxy_pass http://$health_upstream/ready;
        proxy_connect_timeout 2s;
        proxy_send_timeout 4s;
        proxy_read_timeout 4s;
    }

    location / {
        proxy_pass http://kushim-app:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Vite dev server HMR websocket. The Vite dev server itself serves the
        # SPA history fallback (client-side routes like /dashboard, /assets/{id})
        # so no extra try_files is needed; nginx only needs to allow the upgrade.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name auth.kushim.localhost;

    location / {
        proxy_pass http://kushim-auth-front:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js 16 + Turbopack websocket upgrade — required for React to
        # hydrate the dev bundle (otherwise the form falls through to native
        # GET → trailing `?` on the URL).
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

server {
    listen 80;
    server_name api.kushim.localhost;

    location / {
        # Runtime DNS resolution (variable upstream) so nginx no longer resolves
        # `kushim-api` at config load — it can load/start/reload while the API is
        # down, returning a normal non-2xx upstream failure instead of crashing.
        # `proxy_pass` has NO URI part after the variable, so the full normalized
        # request URI (path + query string) is forwarded unchanged: `/v1/me`,
        # `/v1/assets?limit=20&offset=0`, `/health`, `/ready` are NOT rewritten.
        set $api_upstream kushim-api:8080;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name auth-api.kushim.localhost;

    location / {
        # Same runtime-resolution pattern as api.kushim.localhost. No URI part
        # after the variable → the original path + query string are preserved
        # (`/auth/me`, `/auth/refresh`, `/health`, `/ready` are NOT rewritten).
        set $auth_api_upstream kushim-auth-api:3002;
        proxy_pass http://$auth_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
